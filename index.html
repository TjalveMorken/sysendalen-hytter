const KR_SIGNED = new Intl.NumberFormat('nb-NO', { signDisplay: 'exceptZero' });
const fmtKr = (n) => (n == null || isNaN(n)) ? '—' : NOK.format(n) + ' kr';
const fmtKrSigned = (n) => (n == null || isNaN(n)) ? '—' : KR_SIGNED.format(n) + ' kr';
const fmtPct = (n) => (n == null || isNaN(n)) ? '—' : PCT.format(n) + ' %';

const listings = DATA.listings.map(l => {
  const out = { ...l };
  if (l.status === 'new') {
    out._status = 'new';
  } else if (l.prevAskingPrice != null && l.askingPrice != null && l.prevAskingPrice !== l.askingPrice) {
    out._status = l.askingPrice < l.prevAskingPrice ? 'price-down' : 'price-up';
    out._prevPrice = l.prevAskingPrice;
    out._priceDelta = l.askingPrice - l.prevAskingPrice;
    out._pricePct = ((l.askingPrice - l.prevAskingPrice) / l.prevAskingPrice) * 100;
  }
  return out;
});

const min = sorted[0] || 0;
const max = sorted[sorted.length - 1] || 0;

  columns: [
    { name: '', sort: false, formatter: (img) => img
        ? gridjs.html(`<img class="thumb" src="${img}" alt="" loading="lazy">`) : '' },
    { name: 'Eiendom', sort: { compare: (a, b) => a.title.localeCompare(b.title) },
      formatter: (cell) => gridjs.html(`
        <div class="title-cell">
          <a href="${cell.url}" target="_blank" rel="noopener">${cell.title}</a>${cell.badges}
          <div class="addr">${cell.address}${cell.megler ? ' &middot; ' + cell.megler : ''}</div>
        </div>`) },
    { name: 'Type', width: '90px' },
    { name: 'm&sup2;', width: '60px', formatter: (v) => v ?? '—' },
    { name: 'Sov.', width: '50px', formatter: (v) => v ?? '—' },
    { name: 'Prisantydning', width: '160px',
      sort: { compare: (a, b) => (a.price ?? 0) - (b.price ?? 0) },
      formatter: (cell) => gridjs.html(`<span class="price">${fmtKr(cell.price)}</span>${cell.change}`) },
    { name: 'Totalpris', width: '130px',
      formatter: (v) => gridjs.html(`<span class="price">${fmtKr(v)}</span>`) },
    { name: 'Kr/m&sup2;', width: '110px',
      formatter: (v) => v ? fmtKr(v) : '—' }
  ],
  data: tableData,
  sort: true,
  pagination: { limit: 50 },
  style: { table: { 'border-collapse': 'collapse' } }
}).render(document.getElementById('table'));
</script>

</body>
</html>

const NOK = new Intl.NumberFormat('nb-NO');
const PCT = new Intl.NumberFormat('nb-NO', { minimumFractionDigits: 1, maximumFractionDigits: 1, signDisplay: 'exceptZero' });
const KR_SIGNED = new Intl.NumberFormat('nb-NO', { signDisplay: 'exceptZero' });
const fmtKr = (n) => (n == null || isNaN(n)) ? '—' : NOK.format(n) + ' kr';
const fmtKrSigned = (n) => (n == null || isNaN(n)) ? '—' : KR_SIGNED.format(n) + ' kr';
const fmtPct = (n) => (n == null || isNaN(n)) ? '—' : PCT.format(n) + ' %';
const fmtKm = (n) => (n == null || isNaN(n)) ? '—' : NOK.format(n) + ' km';

  const h = document.getElementById('src-hymer'); if (DATA.searches.hymer) h.href = DATA.searches.hymer.url;
}

const sokName = (key) => (DATA.searches && DATA.searches[key]) ? DATA.searches[key].name : key;

// Compute change status from baselinePrice (first observed; set by scheduled task)
const listings = DATA.listings.map(l => {
  const out = { ...l };
  if (l.status === 'new') {
    out._status = 'new';
  } else if (l.baselinePrice != null && l.askingPrice != null && l.baselinePrice !== l.askingPrice) {
    out._status = l.askingPrice < l.baselinePrice ? 'price-down' : 'price-up';
    out._prevPrice = l.baselinePrice;
    out._baselineDate = l.baselineDate;
    out._priceDelta = l.askingPrice - l.baselinePrice;
    out._pricePct = ((l.askingPrice - l.baselinePrice) / l.baselinePrice) * 100;
  }
  return out;
});

// Stats (rentals excluded from price math to avoid skew)
const salePrices = listings.filter(l => !l.leie).map(l => l.askingPrice).filter(p => p != null);
const sorted = [...salePrices].sort((a, b) => a - b);
const median = sorted.length ? sorted[Math.floor(sorted.length / 2)] : 0;
const min = sorted[0] || 0;
const max = sorted[sorted.length - 1] || 0;

const adriaCount = listings.filter(l => l.sok === 'adria').length;
const hymerCount = listings.filter(l => l.sok === 'hymer').length;
const newCount = listings.filter(l => l._status === 'new').length;
const downCount = listings.filter(l => l._status === 'price-down').length;
const upCount = listings.filter(l => l._status === 'price-up').length;

  <div class="stat-card"><div class="stat-label">Adria Compact Supreme</div><div class="stat-value">${adriaCount}</div><div class="stat-sub">Hymer Exsis 580: ${hymerCount}</div></div>
  <div class="stat-card"><div class="stat-label">Median pris (salg)</div><div class="stat-value">${fmtKr(median)}</div><div class="stat-sub">${salePrices.length} til salgs</div></div>
  <div class="stat-card"><div class="stat-label">Prisspenn (salg)</div><div class="stat-value">${fmtKr(min)}</div><div class="stat-sub">opp til ${fmtKr(max)}</div></div>
  <div class="stat-card"><div class="stat-label">Endringer fra baseline</div><div class="stat-value">${newCount + downCount + upCount}</div><div class="stat-sub">${newCount} nye &middot; ${downCount} ned &middot; ${upCount} opp</div></div>
`;

        <span class="tag-sok">${sokName(r.sok)}</span>${r.lastPrice ? ' &mdash; siste pris ' + fmtKr(r.lastPrice) : ''}</li>
      `).join('')}</ul>
    </div>`;
}

// Table
const tableData = listings.map(l => {
  let badges = '';
  let priceChange = '';
  if (l._status === 'new') {
    badges = '<span class="badge badge-new">Ny</span>';
  } else if (l._status === 'price-down') {
    badges = `<span class="badge badge-down">${fmtPct(l._pricePct)}</span>`;
    priceChange = `<span class="price-change down">Baseline ${fmtKr(l._prevPrice)}${l._baselineDate ? ' (' + new Date(l._baselineDate).toLocaleDateString('nb-NO') + ')' : ''} &middot; ${fmtKrSigned(l._priceDelta)} (${fmtPct(l._pricePct)})</span>`;
  } else if (l._status === 'price-up') {
    badges = `<span class="badge badge-up">${fmtPct(l._pricePct)}</span>`;
    priceChange = `<span class="price-change up">Baseline ${fmtKr(l._prevPrice)}${l._baselineDate ? ' (' + new Date(l._baselineDate).toLocaleDateString('nb-NO') + ')' : ''} &middot; ${fmtKrSigned(l._priceDelta)} (${fmtPct(l._pricePct)})</span>`;
  }
  if (l.leie) badges += '<span class="badge badge-leie">Leie</span>';
  const metaParts = [l.sted, l.selger, l.drivstoff, l.girkasse].filter(Boolean);
  return [
    l.image || '',
    { title: l.tittel, url: l.url || ('https://www.finn.no/mobility/item/' + l.id), meta: metaParts.join(' · '), badges },
    sokName(l.sok),

    l.km,

    { name: 'Bobil', sort: { compare: (a, b) => a.title.localeCompare(b.title) },
      formatter: (cell) => gridjs.html(`
        <div class="title-cell">
          <a href="${cell.url}" target="_blank" rel="noopener">${cell.title}</a>${cell.badges}
          <div class="meta">${cell.meta}</div>
        </div>`) },
    { name: 'Søk', width: '150px', formatter: (v) => gridjs.html(`<span class="tag-sok">${v}</span>`) },
    { name: 'År', width: '70px', formatter: (v) => v ?? '—' },
    { name: 'Km', width: '90px',
      sort: { compare: (a, b) => (a ?? 0) - (b ?? 0) },
      formatter: (v) => fmtKm(v) },
    { name: 'Pris', width: '170px',
      sort: { compare: (a, b) => (a.price ?? 0) - (b.price ?? 0) },
      formatter: (cell) => gridjs.html(`<span class="price">${fmtKr(cell.price)}</span>${cell.change}`) }
  ],
  data: tableData,
  sort: true,
  pagination: { limit: 50 },
  style: { table: { 'border-collapse': 'collapse' } }
}).render(document.getElementById('table'));
</script>

</body>
</html>
